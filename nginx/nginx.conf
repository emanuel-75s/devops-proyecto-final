events {
    worker_connections 1024;
}

http {
    upstream clinica_app {
        server app:3000;
    }

    server {
        listen 80;
        server_name clinica-medica.mooo.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name clinica-medica.mooo.com;

        ssl_certificate     /etc/letsencrypt/live/clinica-medica.mooo.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/clinica-medica.mooo.com/privkey.pem;

        # Frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API
        location /api {
            proxy_pass http://clinica_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            proxy_pass http://clinica_app/health;
        }

        location /metrics {
            proxy_pass http://clinica_app/metrics;
        }
    }
}
