name: CI/CD Pipeline - Clinica Medica

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: |
          cd app
          npm install

      - name: Ejecutar tests
        run: |
          cd app
          npm test

      - name: Login a Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: |
            emanuelsalama75/clinica-medica-api:latest
            emanuelsalama75/clinica-medica-api:${{ github.sha }}

      - name: Deploy a AWS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_VM1_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd devops-proyecto-final
            git pull origin main
            docker stack deploy -c docker-compose.swarm.yml clinica
