version: '3.8'

services:

  app:
    image: node:18-alpine
    working_dir: /usr/src/app
    command: sh -c "npm install && node src/index.js"
    volumes:
      - ./app:/usr/src/app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=clinica_db
      - DB_USER=clinica_user
      - DB_PASSWORD=clinica_pass123
    depends_on:
      - postgres
    networks:
      - clinica_network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=clinica_db
      - POSTGRES_USER=clinica_user
      - POSTGRES_PASSWORD=clinica_pass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clinica_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - clinica_network
    deploy:
      replicas: 1

volumes:
  postgres_data:

networks:
  clinica_network:
    driver: overlay
