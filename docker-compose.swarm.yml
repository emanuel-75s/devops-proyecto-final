version: '3.8'

services:
  app:
    image: emanuelsalama75/clinica-medica-api:latest
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=clinica_db
      - DB_USER=clinica_user
      - DB_PASSWORD=clinica_pass123
    networks:
      - clinica_network
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.hostname == ip-172-31-39-9
      restart_policy:
        condition: on-failure
        delay: 15s

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=clinica_db
      - POSTGRES_USER=clinica_user
      - POSTGRES_PASSWORD=clinica_pass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clinica_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == ip-172-31-39-9
      restart_policy:
        condition: on-failure

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - clinica_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == ip-172-31-39-9
      restart_policy:
        condition: on-failure

networks:
  clinica_network:
    driver: overlay

volumes:
  postgres_data:
